name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject cache-busting version
        run: |
          VERSION=$(git rev-parse --short HEAD)
          echo "Using version: $VERSION"
          
          for file in *.html; do
            sed -i "s|assets/css/hmkg\.css\"|assets/css/hmkg.css?v=$VERSION\"|g" "$file"
            sed -i "s|assets/js/hmkg\.js\"|assets/js/hmkg.js?v=$VERSION\"|g" "$file"
          done

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .